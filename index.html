<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Whiteboard - A portable personal clipboard. Write, edit, and share anything.">
    <title>Whiteboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-surface-primary: #0a0a0a;
            --color-surface-secondary: #111111;
            --color-surface-tertiary: #151515;
            --color-surface-hover: #181818;
            --color-surface-elevated: #0f0f0f;

            --color-border-subtle: rgba(255, 255, 255, 0.08);
            --color-border-default: rgba(255, 255, 255, 0.15);
            --color-border-emphasis: rgba(255, 255, 255, 0.25);

            --color-text-muted: rgba(255, 255, 255, 0.4);
            --color-text-secondary: rgba(255, 255, 255, 0.6);
            --color-text-default: rgba(255, 255, 255, 0.7);
            --color-text-emphasis: rgba(255, 255, 255, 0.8);
            --color-text-primary: rgba(255, 255, 255, 0.98);

            --color-accent-cyan: rgba(129, 230, 217, 0.9);
            --color-accent-purple: rgba(183, 148, 244, 0.9);
            --color-accent-green: rgba(154, 230, 180, 0.9);
            --color-accent-blue: rgba(99, 179, 237, 0.9);
            --color-accent-red: rgba(245, 101, 101, 0.9);

            --nav-bg: rgba(10, 10, 10, 0.85);
            --scanline-color: rgba(0, 0, 0, 0.03);
            --grid-line-color: rgba(255, 255, 255, 0.03);
            --confirm-overlay: rgba(0, 0, 0, 0.7);
        }

        /* Light mode */
        html.light {
            --color-surface-primary: #f5f5f4;
            --color-surface-secondary: #ffffff;
            --color-surface-tertiary: #e7e5e4;
            --color-surface-hover: #d6d3d1;
            --color-surface-elevated: #fafaf9;

            --color-border-subtle: rgba(0, 0, 0, 0.06);
            --color-border-default: rgba(0, 0, 0, 0.12);
            --color-border-emphasis: rgba(0, 0, 0, 0.2);

            --color-text-muted: rgba(0, 0, 0, 0.35);
            --color-text-secondary: rgba(0, 0, 0, 0.5);
            --color-text-default: rgba(0, 0, 0, 0.65);
            --color-text-emphasis: rgba(0, 0, 0, 0.8);
            --color-text-primary: rgba(0, 0, 0, 0.95);

            --color-accent-cyan: rgba(14, 165, 143, 0.95);
            --color-accent-purple: rgba(124, 58, 237, 0.9);
            --color-accent-green: rgba(22, 163, 74, 0.9);
            --color-accent-blue: rgba(37, 99, 235, 0.9);
            --color-accent-red: rgba(220, 38, 38, 0.9);

            --nav-bg: rgba(245, 245, 244, 0.85);
            --scanline-color: rgba(0, 0, 0, 0.01);
            --grid-line-color: rgba(0, 0, 0, 0.04);
            --confirm-overlay: rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--color-surface-primary);
            color: var(--color-text-default);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Scanlines overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scanline-color) 2px,
                var(--scanline-color) 4px
            );
        }

        /* Grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            background:
                linear-gradient(var(--grid-line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line-color) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Animations */
        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--color-accent-cyan), -2px 0 var(--color-accent-purple); transform: translate(0); }
            20% { text-shadow: -2px 0 var(--color-accent-cyan), 2px 0 var(--color-accent-purple); transform: translate(-2px, 2px); }
            40% { text-shadow: 2px 0 var(--color-accent-cyan), -2px 0 var(--color-accent-purple); transform: translate(2px, -2px); }
            60% { text-shadow: -2px 0 var(--color-accent-cyan), 2px 0 var(--color-accent-purple); transform: translate(-2px, 2px); }
            80% { text-shadow: 2px 0 var(--color-accent-cyan), -2px 0 var(--color-accent-purple); transform: translate(2px, -2px); }
            100% { text-shadow: none; transform: translate(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1.25rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--nav-bg);
            border-bottom: 1px solid var(--color-border-subtle);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text-primary);
            letter-spacing: -0.02em;
            cursor: default;
            transition: all 0.3s ease;
        }

        .logo:hover {
            animation: glitch 0.3s ease;
        }

        .logo span {
            color: var(--color-accent-cyan);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--color-border-default);
            color: var(--color-text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .nav-btn:hover {
            border-color: var(--color-accent-cyan);
            color: var(--color-accent-cyan);
            background: rgba(129, 230, 217, 0.05);
        }

        html.light .nav-btn:hover {
            background: rgba(14, 165, 143, 0.08);
        }

        /* Theme toggle */
        .theme-toggle {
            background: none;
            border: 1px solid var(--color-border-default);
            color: var(--color-text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            border-color: var(--color-accent-cyan);
            color: var(--color-accent-cyan);
        }

        .theme-toggle svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        html.light .theme-toggle .icon-sun { display: block; }
        html.light .theme-toggle .icon-moon { display: none; }

        .item-count {
            font-size: 0.65rem;
            color: var(--color-text-muted);
            letter-spacing: 0.1em;
        }

        /* Main content */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 7rem 2rem 4rem;
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-accent-cyan);
            white-space: nowrap;
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--color-border-default), transparent);
        }

        /* Input area */
        .input-area {
            background: var(--color-surface-secondary);
            border: 1px solid var(--color-border-subtle);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .input-area:focus-within {
            border-color: var(--color-accent-cyan);
            box-shadow: 0 0 0 1px rgba(129, 230, 217, 0.1);
        }

        html.light .input-area:focus-within {
            box-shadow: 0 0 0 1px rgba(14, 165, 143, 0.15);
        }

        .clip-editor {
            width: 100%;
            min-height: 100px;
            background: none;
            border: none;
            color: var(--color-text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            outline: none;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .clip-editor:empty::before {
            content: 'Paste or type anything here...';
            color: var(--color-text-muted);
            pointer-events: none;
        }

        /* Preserve pasted formatting but constrain it */
        .clip-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 0.5rem 0;
        }

        .clip-editor a {
            color: var(--color-accent-cyan);
        }

        .clip-editor table {
            border-collapse: collapse;
            margin: 0.5rem 0;
            width: 100%;
        }

        .clip-editor td, .clip-editor th {
            border: 1px solid var(--color-border-default);
            padding: 0.3rem 0.5rem;
            font-size: 0.8rem;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border-subtle);
        }

        .input-hints {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .input-hint {
            font-size: 0.65rem;
            color: var(--color-text-muted);
            letter-spacing: 0.05em;
        }

        .input-hint kbd {
            background: var(--color-surface-tertiary);
            border: 1px solid var(--color-border-default);
            border-radius: 3px;
            padding: 0.1rem 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
        }

        .format-badge {
            font-size: 0.55rem;
            color: var(--color-accent-purple);
            border: 1px solid var(--color-accent-purple);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .format-badge.visible {
            opacity: 1;
        }

        .add-btn {
            background: rgba(129, 230, 217, 0.1);
            border: 1px solid var(--color-accent-cyan);
            color: var(--color-accent-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        html.light .add-btn {
            background: rgba(14, 165, 143, 0.1);
        }

        .add-btn:hover {
            background: rgba(129, 230, 217, 0.2);
            transform: translateY(-1px);
        }

        html.light .add-btn:hover {
            background: rgba(14, 165, 143, 0.2);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        /* Clipboard items */
        .items-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .clip-item {
            background: var(--color-surface-secondary);
            border: 1px solid var(--color-border-subtle);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            position: relative;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease;
        }

        .clip-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--color-accent-cyan), var(--color-accent-purple));
            border-radius: 8px 8px 0 0;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .clip-item:hover {
            border-color: var(--color-border-default);
            transform: translateY(-2px);
        }

        .clip-item:hover::before {
            transform: scaleX(1);
        }

        .clip-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .clip-item-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .clip-index {
            font-size: 0.6rem;
            color: var(--color-accent-cyan);
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        .clip-time {
            font-size: 0.6rem;
            color: var(--color-text-muted);
            letter-spacing: 0.05em;
        }

        .clip-type-badge {
            font-size: 0.5rem;
            color: var(--color-accent-purple);
            border: 1px solid var(--color-accent-purple);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .clip-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .clip-item:hover .clip-actions {
            opacity: 1;
        }

        .clip-action-btn {
            background: none;
            border: 1px solid var(--color-border-subtle);
            color: var(--color-text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .clip-action-btn:hover {
            border-color: var(--color-accent-cyan);
            color: var(--color-accent-cyan);
        }

        .clip-action-btn.delete:hover {
            border-color: var(--color-accent-red);
            color: var(--color-accent-red);
        }

        .clip-content {
            font-size: 0.8rem;
            line-height: 1.7;
            color: var(--color-text-emphasis);
            word-break: break-word;
        }

        .clip-content.plain {
            white-space: pre-wrap;
        }

        .clip-content.rich img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 0.5rem 0;
        }

        .clip-content.rich a {
            color: var(--color-accent-cyan);
        }

        .clip-content.rich table {
            border-collapse: collapse;
            margin: 0.5rem 0;
            width: 100%;
        }

        .clip-content.rich td, .clip-content.rich th {
            border: 1px solid var(--color-border-default);
            padding: 0.3rem 0.5rem;
            font-size: 0.8rem;
        }

        .clip-content.rich ul, .clip-content.rich ol {
            padding-left: 1.5rem;
            margin: 0.25rem 0;
        }

        .clip-content.rich h1, .clip-content.rich h2, .clip-content.rich h3,
        .clip-content.rich h4, .clip-content.rich h5, .clip-content.rich h6 {
            margin: 0.5rem 0 0.25rem;
            color: var(--color-text-primary);
        }

        .clip-content.rich blockquote {
            border-left: 3px solid var(--color-accent-cyan);
            padding-left: 0.75rem;
            margin: 0.5rem 0;
            color: var(--color-text-secondary);
        }

        .clip-content.rich pre, .clip-content.rich code {
            background: var(--color-surface-tertiary);
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        .clip-content.rich pre {
            padding: 0.75rem;
            margin: 0.5rem 0;
            overflow-x: auto;
        }

        .clip-content.rich code {
            padding: 0.1rem 0.3rem;
            font-size: 0.75rem;
        }

        /* Edit mode */
        .clip-item.editing {
            border-color: var(--color-accent-cyan);
        }

        .clip-item.editing::before {
            transform: scaleX(1);
        }

        .edit-area {
            width: 100%;
            background: var(--color-surface-primary);
            border: 1px solid var(--color-border-default);
            border-radius: 4px;
            color: var(--color-text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.7;
            padding: 0.75rem;
            min-height: 60px;
            outline: none;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .edit-area:focus {
            border-color: var(--color-accent-cyan);
        }

        /* For plain text editing, use textarea */
        textarea.edit-area {
            resize: vertical;
        }

        .edit-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            justify-content: flex-end;
        }

        .edit-save-btn {
            background: rgba(129, 230, 217, 0.1);
            border: 1px solid var(--color-accent-cyan);
            color: var(--color-accent-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .edit-save-btn:hover {
            background: rgba(129, 230, 217, 0.2);
        }

        .edit-cancel-btn {
            background: none;
            border: 1px solid var(--color-border-default);
            color: var(--color-text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .edit-cancel-btn:hover {
            border-color: var(--color-text-secondary);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            animation: fadeIn 0.5s ease;
        }

        .empty-state .terminal-prompt {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-bottom: 0.5rem;
        }

        .empty-state .terminal-prompt span {
            color: var(--color-accent-green);
        }

        .empty-state .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--color-accent-cyan);
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        .empty-state p {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            margin-top: 1rem;
            letter-spacing: 0.05em;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--color-surface-secondary);
            border: 1px solid var(--color-accent-cyan);
            color: var(--color-accent-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 0.75rem 1.25rem;
            border-radius: 6px;
            z-index: 1000;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            letter-spacing: 0.05em;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Search */
        .search-container {
            position: relative;
            margin-bottom: 1.5rem;
            display: none;
        }

        .search-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .search-input {
            width: 100%;
            background: var(--color-surface-secondary);
            border: 1px solid var(--color-border-default);
            color: var(--color-text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--color-accent-cyan);
        }

        .search-input::placeholder {
            color: var(--color-text-muted);
        }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            font-size: 0.75rem;
        }

        /* Confirm dialog */
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--confirm-overlay);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .confirm-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .confirm-dialog {
            background: var(--color-surface-secondary);
            border: 1px solid var(--color-border-emphasis);
            border-radius: 8px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .confirm-dialog p {
            font-size: 0.8rem;
            color: var(--color-text-emphasis);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .confirm-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .confirm-yes {
            background: rgba(245, 101, 101, 0.1);
            border: 1px solid var(--color-accent-red);
            color: var(--color-accent-red);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .confirm-yes:hover {
            background: rgba(245, 101, 101, 0.2);
        }

        .confirm-no {
            background: none;
            border: 1px solid var(--color-border-default);
            color: var(--color-text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .confirm-no:hover {
            border-color: var(--color-text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            main {
                padding: 6rem 1.25rem 3rem;
            }

            .input-area {
                padding: 1rem;
            }

            .clip-item {
                padding: 1rem 1.25rem;
            }

            .clip-actions {
                opacity: 1;
            }

            .input-hint {
                display: none;
            }

            .nav-actions {
                gap: 0.5rem;
            }

            .nav-btn {
                padding: 0.4rem 0.75rem;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="grid-bg"></div>

    <nav>
        <div class="logo"><span>&gt;</span> whiteboard</div>
        <div class="nav-actions">
            <span class="item-count" id="itemCount">0 items</span>
            <button class="nav-btn" id="searchToggle" title="Search">search</button>
            <button class="nav-btn" id="clearAllBtn">clear all</button>
            <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">
                <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </nav>

    <main>
        <div class="section-header">
            <span class="section-label">// Clipboard</span>
            <div class="section-line"></div>
        </div>

        <div class="input-area">
            <div class="clip-editor" id="clipInput" contenteditable="true"></div>
            <div class="input-footer">
                <div class="input-hints">
                    <span class="input-hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to add</span>
                    <span class="format-badge" id="formatBadge">rich text</span>
                </div>
                <button class="add-btn" id="addBtn">+ Add</button>
            </div>
        </div>

        <div class="search-container" id="searchContainer">
            <span class="search-icon">$</span>
            <input type="text" class="search-input" id="searchInput" placeholder="grep items...">
        </div>

        <div class="items-container" id="itemsContainer"></div>
    </main>

    <div class="toast" id="toast"></div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <p id="confirmMessage">Are you sure?</p>
            <div class="confirm-actions">
                <button class="confirm-yes" id="confirmYes">Yes</button>
                <button class="confirm-no" id="confirmNo">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCQM_SvYrxR7bLIz_LQtYHGMWcNtEgVJPs",
            authDomain: "whiteboard-58bff.firebaseapp.com",
            projectId: "whiteboard-58bff",
            storageBucket: "whiteboard-58bff.firebasestorage.app",
            messagingSenderId: "805456951507",
            appId: "1:805456951507:web:e46e861cfe36748cdf7c26",
            measurementId: "G-LCJQ5LNTZN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const itemsRef = collection(db, 'items');

        const THEME_KEY = 'whiteboard_theme';

        // State
        let items = [];
        let searchQuery = '';
        let hasRichContent = false;

        // DOM
        const clipInput = document.getElementById('clipInput');
        const addBtn = document.getElementById('addBtn');
        const itemsContainer = document.getElementById('itemsContainer');
        const itemCount = document.getElementById('itemCount');
        const toast = document.getElementById('toast');
        const searchToggle = document.getElementById('searchToggle');
        const searchContainer = document.getElementById('searchContainer');
        const searchInput = document.getElementById('searchInput');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');
        const themeToggle = document.getElementById('themeToggle');
        const formatBadge = document.getElementById('formatBadge');

        // Theme
        function initTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'light') {
                document.documentElement.classList.add('light');
            }
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light');
            localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
        }

        initTheme();
        themeToggle.addEventListener('click', toggleTheme);

        // Real-time listener: Firestore -> local state
        const q = query(itemsRef, orderBy('created', 'desc'));
        onSnapshot(q, (snapshot) => {
            items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        }, (err) => {
            console.error('Firestore listener error:', err);
            showToast('Sync error');
        });

        // Save item to Firestore
        async function saveItem(item) {
            try {
                await setDoc(doc(db, 'items', item.id), {
                    content: item.content,
                    isRich: item.isRich || false,
                    created: item.created
                });
            } catch (err) {
                console.error('Save failed:', err);
                showToast('Failed to save');
            }
        }

        // Remove item from Firestore
        async function removeItem(id) {
            try {
                await deleteDoc(doc(db, 'items', id));
            } catch (err) {
                console.error('Delete failed:', err);
                showToast('Failed to delete');
            }
        }

        // Show toast notification
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        }

        // Format timestamp
        function formatTime(ts) {
            const d = new Date(ts);
            const now = new Date();
            const diff = now - d;

            if (diff < 60000) return 'just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';

            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Check if HTML has actual formatting beyond plain text
        function isRichHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            // Check if it contains any formatting elements
            const richTags = div.querySelectorAll('b, strong, i, em, u, a, img, table, ul, ol, li, h1, h2, h3, h4, h5, h6, blockquote, pre, code, span[style], p[style], div[style], font');
            if (richTags.length > 0) return true;
            // Check for styled elements
            const allElements = div.querySelectorAll('*');
            for (const el of allElements) {
                if (el.style && el.style.cssText) return true;
            }
            return false;
        }

        // Sanitize HTML to prevent XSS but keep formatting
        function sanitizeHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            // Remove script tags and event handlers
            div.querySelectorAll('script, style, iframe, object, embed, form, input').forEach(el => el.remove());
            const allElements = div.querySelectorAll('*');
            for (const el of allElements) {
                const attrs = [...el.attributes];
                for (const attr of attrs) {
                    if (attr.name.startsWith('on') || attr.name === 'srcdoc') {
                        el.removeAttribute(attr.name);
                    }
                    if (attr.name === 'href' || attr.name === 'src') {
                        const val = attr.value.trim().toLowerCase();
                        if (val.startsWith('javascript:') || val.startsWith('data:text/html')) {
                            el.removeAttribute(attr.name);
                        }
                    }
                }
            }
            return div.innerHTML;
        }

        // Add item
        function addItem() {
            const html = clipInput.innerHTML.trim();
            const text = clipInput.innerText.trim();
            if (!text) return;

            const isRich = isRichHtml(html);
            const item = {
                id: String(Date.now()),
                content: isRich ? sanitizeHtml(html) : text,
                isRich: isRich,
                created: Date.now()
            };

            saveItem(item);
            clipInput.innerHTML = '';
            hasRichContent = false;
            formatBadge.classList.remove('visible');
            showToast('Item added');
        }

        // Delete item
        function deleteItem(id) {
            removeItem(id);
            showToast('Item removed');
        }

        // Copy item to clipboard
        function copyItem(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;

            if (item.isRich) {
                // Copy as rich text using ClipboardItem API
                try {
                    const blob = new Blob([item.content], { type: 'text/html' });
                    const textBlob = new Blob([stripHtml(item.content)], { type: 'text/plain' });
                    navigator.clipboard.write([
                        new ClipboardItem({
                            'text/html': blob,
                            'text/plain': textBlob
                        })
                    ]).then(() => showToast('Copied with formatting'));
                } catch {
                    // Fallback to plain text
                    navigator.clipboard.writeText(stripHtml(item.content)).then(() => {
                        showToast('Copied as plain text');
                    });
                }
            } else {
                navigator.clipboard.writeText(item.content).then(() => {
                    showToast('Copied to clipboard');
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = item.content;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('Copied to clipboard');
                });
            }
        }

        function stripHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            return div.textContent || div.innerText || '';
        }

        // Start editing
        function startEdit(id) {
            render(id);
        }

        // Save edit
        function saveEdit(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;

            if (item.isRich) {
                const editEl = document.getElementById(`edit-${id}`);
                if (editEl) {
                    const html = editEl.innerHTML.trim();
                    const text = editEl.innerText.trim();
                    if (text) {
                        item.content = sanitizeHtml(html);
                        saveItem(item);
                        showToast('Item updated');
                    }
                }
            } else {
                const editEl = document.getElementById(`edit-${id}`);
                if (editEl && editEl.value.trim()) {
                    item.content = editEl.value.trim();
                    saveItem(item);
                    showToast('Item updated');
                }
            }
            render();
        }

        // Confirm dialog
        function showConfirm(message) {
            return new Promise((resolve) => {
                confirmMessage.textContent = message;
                confirmOverlay.classList.add('visible');

                const onYes = () => {
                    confirmOverlay.classList.remove('visible');
                    cleanup();
                    resolve(true);
                };

                const onNo = () => {
                    confirmOverlay.classList.remove('visible');
                    cleanup();
                    resolve(false);
                };

                const cleanup = () => {
                    confirmYes.removeEventListener('click', onYes);
                    confirmNo.removeEventListener('click', onNo);
                };

                confirmYes.addEventListener('click', onYes);
                confirmNo.addEventListener('click', onNo);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Render items
        function render(editingId = null) {
            const filtered = searchQuery
                ? items.filter(item => {
                    const text = item.isRich ? stripHtml(item.content) : item.content;
                    return text.toLowerCase().includes(searchQuery.toLowerCase());
                })
                : items;

            updateCount(filtered.length);

            if (filtered.length === 0) {
                const emptyMsg = searchQuery
                    ? 'No items match your search.'
                    : 'Your clipboard is empty. Paste something above to get started.';

                itemsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="terminal-prompt">
                            <span>$</span> whiteboard --list<span class="cursor"></span>
                        </div>
                        <p>${emptyMsg}</p>
                    </div>
                `;
                return;
            }

            itemsContainer.innerHTML = filtered.map((item, i) => {
                const isEditing = item.id === editingId;
                const index = String(filtered.length - i).padStart(2, '0');

                if (isEditing) {
                    if (item.isRich) {
                        return `
                            <div class="clip-item editing" data-id="${item.id}">
                                <div class="clip-item-header">
                                    <div class="clip-item-meta">
                                        <span class="clip-index">#${index}</span>
                                        <span class="clip-time">${formatTime(item.created)}</span>
                                        <span class="clip-type-badge">rich</span>
                                    </div>
                                </div>
                                <div class="edit-area" id="edit-${item.id}" contenteditable="true">${item.content}</div>
                                <div class="edit-actions">
                                    <button class="edit-cancel-btn" onclick="render()">Cancel</button>
                                    <button class="edit-save-btn" onclick="saveEdit('${item.id}')">Save</button>
                                </div>
                            </div>
                        `;
                    }
                    return `
                        <div class="clip-item editing" data-id="${item.id}">
                            <div class="clip-item-header">
                                <div class="clip-item-meta">
                                    <span class="clip-index">#${index}</span>
                                    <span class="clip-time">${formatTime(item.created)}</span>
                                </div>
                            </div>
                            <textarea class="edit-area" id="edit-${item.id}">${escapeHtml(item.content)}</textarea>
                            <div class="edit-actions">
                                <button class="edit-cancel-btn" onclick="render()">Cancel</button>
                                <button class="edit-save-btn" onclick="saveEdit('${item.id}')">Save</button>
                            </div>
                        </div>
                    `;
                }

                const typeBadge = item.isRich ? '<span class="clip-type-badge">rich</span>' : '';
                const contentClass = item.isRich ? 'clip-content rich' : 'clip-content plain';
                const contentHtml = item.isRich ? item.content : escapeHtml(item.content);

                return `
                    <div class="clip-item" data-id="${item.id}">
                        <div class="clip-item-header">
                            <div class="clip-item-meta">
                                <span class="clip-index">#${index}</span>
                                <span class="clip-time">${formatTime(item.created)}</span>
                                ${typeBadge}
                            </div>
                            <div class="clip-actions">
                                <button class="clip-action-btn" onclick="copyItem('${item.id}')">Copy</button>
                                <button class="clip-action-btn" onclick="startEdit('${item.id}')">Edit</button>
                                <button class="clip-action-btn delete" onclick="deleteItem('${item.id}')">Del</button>
                            </div>
                        </div>
                        <div class="${contentClass}">${contentHtml}</div>
                    </div>
                `;
            }).join('');

            if (editingId) {
                const editEl = document.getElementById(`edit-${editingId}`);
                if (editEl) {
                    editEl.focus();
                    if (editEl.tagName === 'TEXTAREA') {
                        editEl.setSelectionRange(editEl.value.length, editEl.value.length);
                    } else {
                        // contenteditable: move cursor to end
                        const range = document.createRange();
                        range.selectNodeContents(editEl);
                        range.collapse(false);
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                }
            }
        }

        function updateCount(count) {
            const total = items.length;
            if (searchQuery && count !== total) {
                itemCount.textContent = `${count}/${total} items`;
            } else {
                itemCount.textContent = `${total} item${total !== 1 ? 's' : ''}`;
            }
        }

        // Event listeners
        addBtn.addEventListener('click', addItem);

        clipInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                addItem();
            }
        });

        // Detect rich paste in the editor
        clipInput.addEventListener('paste', () => {
            // Check after the paste is applied
            setTimeout(() => {
                const html = clipInput.innerHTML;
                hasRichContent = isRichHtml(html);
                formatBadge.classList.toggle('visible', hasRichContent);
            }, 10);
        });

        // Track input changes
        clipInput.addEventListener('input', () => {
            if (!hasRichContent) return;
            // If all content is removed, reset
            if (!clipInput.innerText.trim()) {
                hasRichContent = false;
                formatBadge.classList.remove('visible');
            }
        });

        // Search toggle
        searchToggle.addEventListener('click', () => {
            const isActive = searchContainer.classList.toggle('active');
            if (isActive) {
                searchInput.focus();
            } else {
                searchInput.value = '';
                searchQuery = '';
                render();
            }
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (searchContainer.classList.contains('active')) {
                    searchContainer.classList.remove('active');
                    searchInput.value = '';
                    searchQuery = '';
                    render();
                }
                if (confirmOverlay.classList.contains('visible')) {
                    confirmOverlay.classList.remove('visible');
                }
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchContainer.classList.add('active');
                searchInput.focus();
            }
        });

        // Clear all
        clearAllBtn.addEventListener('click', async () => {
            if (items.length === 0) return;
            const confirmed = await showConfirm('Clear all items from the whiteboard?');
            if (confirmed) {
                const promises = items.map(item => removeItem(item.id));
                await Promise.all(promises);
                showToast('All items cleared');
            }
        });

        // Handle paste anywhere on page (when not focused on an input)
        document.addEventListener('paste', (e) => {
            if (document.activeElement === clipInput || document.activeElement === searchInput) return;
            if (document.activeElement && (document.activeElement.classList.contains('edit-area') || document.activeElement.tagName === 'TEXTAREA')) return;

            const html = e.clipboardData.getData('text/html');
            const text = e.clipboardData.getData('text/plain');

            if (html && isRichHtml(html)) {
                clipInput.innerHTML = sanitizeHtml(html);
                hasRichContent = true;
                formatBadge.classList.add('visible');
            } else if (text.trim()) {
                clipInput.innerText = text;
                hasRichContent = false;
                formatBadge.classList.remove('visible');
            }
            clipInput.focus();
            // Move cursor to end
            const range = document.createRange();
            range.selectNodeContents(clipInput);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        });

        // Expose functions to onclick handlers (module scope)
        window.render = render;
        window.copyItem = copyItem;
        window.startEdit = startEdit;
        window.saveEdit = saveEdit;
        window.deleteItem = deleteItem;
    </script>

</body>
</html>
